name: Task
description: 팀 프로젝트 작업 이슈
title: "[Task] "
labels: ["task"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 내용
      description: 해야 할 일을 간단히 적어주세요.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 어떤 상태가 되면 완료인지 적어주세요.
    validations:
      required: true
  - type: input
    id: due
    attributes:
      label: 마감일
      placeholder: "2026-05-29"
    validations:
      required: false

