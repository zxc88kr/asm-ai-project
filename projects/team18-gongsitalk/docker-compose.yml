services:
  backend:
    build:
      context: .
    image: gongsitalk-app:latest
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
    image: gongsitalk-app:latest
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501 --server.headless true
    env_file:
      - .env
    environment:
      GONGSITALK_BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      backend:
        condition: service_healthy
