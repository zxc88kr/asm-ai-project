services:
  mysql:
    image: mysql:8.4
    container_name: review-helper-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-review_helper}
      MYSQL_USER: ${MYSQL_USER:-review_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-review_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-review_root_password}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-review_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: