name: Claude PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review pull request
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude PR review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this backend pull request for correctness, maintainability, API behavior, and operational regressions.

            Focus on:
            - game progression logic, deduction/evaluation rules, and state transitions
            - API contract compatibility, validation, and error handling
            - persistence, deployment, and security-sensitive changes
            - missing or weak tests for changed behavior

            Prioritize actionable bugs and risks. Leave inline comments only where a specific code location needs a change.
            Always leave a top-level PR comment with a concise review summary, even when there are no findings.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
